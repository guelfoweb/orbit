[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "orbit"
version = "0.1.0"
description = "Simple interactive local-tool REPL for Ollama tool calling"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = ["ollama>=0.6.0", "Pillow>=10.0.0", "rich>=13.0.0"]

[project.scripts]
orbit = "orbit.terminal.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = false

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
orbit = ["builtins/**/SKILL.md"]
